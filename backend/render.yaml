services:
  - type: web
    name: campus-nexus-backend
    env: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: campus-nexus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: campus-nexus-db
    plan: free
    region: singapore
    databaseName: campusnexus
    user: admin
